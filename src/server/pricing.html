<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Model · XLab Token</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
  <link rel="shortcut icon" href="/assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="brand-logo-wrap" href="/" title="XLab Token" aria-label="XLab Token">
          <img class="brand-logo" src="/assets/logo.png" alt="XLab Token" width="140" height="56"
            onerror="this.style.display='none'; document.querySelector('.brand-mark').style.display='flex';" />
          <div class="brand-mark" aria-hidden="true"><span class="x">X</span><span class="lab">Lab</span></div>
        </a>
      </div>
      <nav class="nav" aria-label="Main">
        <a class="nav-link" href="/">Dashboard</a>
        <a class="nav-link" href="/agents">Agents</a>
        <a class="nav-link active" href="/model">Model</a>
        <a class="nav-link" href="/settings">Settings</a>
      </nav>
      <div class="top-actions">
        <span class="meta-chip" id="meta">Loading…</span>
        <button class="icon-btn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme"></button>
      </div>
    </div>
  </header>

  <main class="shell model-page">
    <div class="usage-toolbar">
      <div>
        <h1 class="page-title">Models</h1>
        <p class="page-sub">OpenRouter catalog · USD / 1M tokens · custom rates override</p>
      </div>
      <div class="usage-actions">
        <span class="pricing-status muted" id="pricingStatus">—</span>
        <button class="btn btn-with-icon" id="pricingReload" type="button">Refresh</button>
        <button class="btn btn-primary btn-with-icon" id="pricingSave" type="button">Save</button>
      </div>
    </div>

    <section class="u-card model-or-panel">
      <!-- OpenRouter-style search + filters -->
      <div class="or-search-bar">
        <svg class="or-search-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="M20 20l-3-3"/></svg>
        <input id="priceSearch" class="or-search-input" type="search" placeholder="Filter models (e.g. claude sonnet free)…" autocomplete="off" autofocus />
        <kbd class="or-search-hint">space = AND</kbd>
      </div>

      <div class="or-filters">
        <div class="or-filter-group" role="group" aria-label="Quick filters">
          <button type="button" class="or-chip active" data-filter="all">All</button>
          <button type="button" class="or-chip" data-filter="free">Free</button>
          <button type="button" class="or-chip" data-filter="seen">Seen</button>
          <button type="button" class="or-chip" data-filter="custom">Custom</button>
        </div>
        <select id="providerFilter" class="or-select" aria-label="Provider">
          <option value="">All providers</option>
        </select>
        <select id="sortFilter" class="or-select" aria-label="Sort">
          <option value="newest">Newest</option>
          <option value="name">Name</option>
          <option value="price-asc">Price ↑</option>
          <option value="price-desc">Price ↓</option>
          <option value="context">Context</option>
        </select>
        <span class="or-count muted" id="resultCount">—</span>
      </div>

      <div class="or-list" id="modelList">
        <div class="empty">Loading OpenRouter models…</div>
      </div>

      <div class="model-add-row">
        <input type="text" id="priceModel" placeholder="Custom model id" />
        <input type="number" id="priceIn" step="0.001" min="0" placeholder="In $/1M" />
        <input type="number" id="priceOut" step="0.001" min="0" placeholder="Out $/1M" />
        <button type="button" class="btn btn-primary btn-with-icon" id="priceAdd">Add</button>
      </div>
      <p class="model-path muted">Config · <code id="pricingPath">…</code></p>
    </section>

    <footer>
      <div>Rates from OpenRouter · editable overrides apply to all agents</div>
      <div>localhost only · estimated cost, not billing</div>
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);

    function escapeHtml(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function normalizeModelName(model) {
      if (model == null) return '';
      let m = String(model).trim();
      if (!m) return '';
      for (let i = 0; i < 3; i++) {
        const next = m.replace(/\s*\([^)]*\)\s*$/g, '').trim();
        if (next === m) break;
        m = next;
      }
      m = m.replace(/\s*\[[^\]]*\]\s*$/g, '').trim();
      if (m.includes('|')) m = m.split('|')[0].trim();
      if (m.includes('/') && !m.startsWith('http')) {
        const parts = m.split('/').map((p) => p.trim()).filter(Boolean);
        const last = parts[parts.length - 1] || m;
        if (last && last.length >= 2 && !/^(models?|v\d+)$/i.test(last)) m = last;
      }
      return m.replace(/\s+/g, ' ').replace(/[-_:|]+$/g, '').trim();
    }

    const ICONS = {
      moon: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/></svg>',
      sun: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
      reload: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
      save: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><path d="M17 21v-8H7v8M7 3v5h8"/></svg>',
      plus: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>',
    };

    function applyTheme(mode) {
      document.documentElement.classList.toggle('dark', mode === 'dark');
      localStorage.setItem('xlab-token-theme', mode);
      const btn = $('themeBtn');
      btn.innerHTML = mode === 'dark' ? ICONS.sun : ICONS.moon;
      btn.title = mode === 'dark' ? 'Light mode' : 'Dark mode';
    }
    applyTheme(localStorage.getItem('xlab-token-theme') === 'dark' ? 'dark' : 'light');
    $('pricingReload').innerHTML = ICONS.reload + '<span>Refresh</span>';
    $('pricingSave').innerHTML = ICONS.save + '<span>Save</span>';
    $('priceAdd').innerHTML = ICONS.plus + '<span>Add</span>';
    $('themeBtn').onclick = () => {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    };

    let pricingDraft = {};
    let openrouter = [];
    let seenSet = new Set();
    let customRates = {};
    let quickFilter = 'all';
    let renderTimer = 0;

    function setStatus(text) {
      $('pricingStatus').textContent = text;
    }

    function fmtCtx(n) {
      const v = Number(n) || 0;
      if (v >= 1e6) return (v / 1e6).toFixed(v % 1e6 === 0 ? 0 : 1) + 'M';
      if (v >= 1e3) return Math.round(v / 1e3) + 'K';
      return String(v || '—');
    }

    function fmtPrice(n) {
      const v = Number(n) || 0;
      if (v === 0) return '0';
      if (v < 0.01) return v.toFixed(4);
      if (v < 1) return v.toFixed(3);
      return v.toFixed(2);
    }

    /** OpenRouter-style multi-token AND search on id, name, provider, slug */
    function matchesQuery(m, q) {
      if (!q) return true;
      const tokens = q.toLowerCase().split(/\s+/).filter(Boolean);
      if (!tokens.length) return true;
      const hay = [m.id, m.name, m.provider, m.slug, m.modality].join(' ').toLowerCase();
      return tokens.every((t) => hay.includes(t));
    }

    function effectiveRates(m) {
      const id = (m.id || '').toLowerCase();
      const slug = (m.slug || '').toLowerCase();
      const draft = pricingDraft[id] || pricingDraft[slug];
      const cust = customRates[id] || customRates[slug];
      return {
        input: draft?.inputPer1M ?? cust?.inputPer1M ?? m.inputPer1M ?? 0,
        output: draft?.outputPer1M ?? cust?.outputPer1M ?? m.outputPer1M ?? 0,
        source: draft ? 'draft' : cust ? 'custom' : (m.source || 'openrouter'),
      };
    }

    function filteredModels() {
      const q = ($('priceSearch').value || '').trim();
      const provider = $('providerFilter').value || '';
      const sort = $('sortFilter').value || 'newest';
      let list = openrouter.filter((m) => {
        if (!matchesQuery(m, q)) return false;
        if (provider && m.provider !== provider) return false;
        const rates = effectiveRates(m);
        const isCustom = rates.source === 'custom' || rates.source === 'draft';
        const isSeen = seenSet.has((m.slug || '').toLowerCase()) || seenSet.has((m.id || '').toLowerCase())
          || [...seenSet].some((s) => s.includes((m.slug || '').toLowerCase()));
        if (quickFilter === 'free') {
          const isFree = (Number(rates.input) === 0 && Number(rates.output) === 0) || m.free;
          if (!isFree) return false;
        }
        if (quickFilter === 'seen' && !isSeen) return false;
        if (quickFilter === 'custom' && !isCustom) return false;
        return true;
      });

      list = list.slice().sort((a, b) => {
        const ra = effectiveRates(a);
        const rb = effectiveRates(b);
        if (sort === 'name') return a.name.localeCompare(b.name);
        if (sort === 'price-asc') return (ra.input + ra.output) - (rb.input + rb.output);
        if (sort === 'price-desc') return (rb.input + rb.output) - (ra.input + ra.output);
        if (sort === 'context') return (b.contextLength || 0) - (a.contextLength || 0);
        // newest
        return (b.created || 0) - (a.created || 0) || a.name.localeCompare(b.name);
      });
      return list;
    }

    function renderList() {
      const list = filteredModels();
      $('resultCount').textContent = list.length + ' / ' + openrouter.length;
      if (!list.length) {
        $('modelList').innerHTML = '<div class="empty">No models match filters.</div>';
        return;
      }
      // Cap DOM for performance; search narrows list quickly
      const MAX = 200;
      const slice = list.slice(0, MAX);
      const more = list.length > MAX
        ? `<div class="or-more muted">Showing ${MAX} of ${list.length} — refine search</div>`
        : '';

      $('modelList').innerHTML = slice.map((m) => {
        const rates = effectiveRates(m);
        const id = escapeHtml(m.id);
        const free = Number(rates.input) === 0 && Number(rates.output) === 0;
        const src = rates.source;
        return `<article class="or-card ${src === 'custom' || src === 'draft' ? 'is-custom' : ''} ${free ? 'is-free' : ''}" data-id="${id}">
          <div class="or-card-main">
            <div class="or-card-title-row">
              <h3 class="or-card-name" title="${escapeHtml(m.name)}">${escapeHtml(m.name)}</h3>
              ${free ? '<span class="or-badge free">Free</span>' : ''}
              ${src === 'custom' || src === 'draft' ? '<span class="or-badge custom">' + escapeHtml(src) + '</span>' : ''}
            </div>
            <div class="or-card-meta">
              <code class="or-id">${id}</code>
              <span class="or-dot">·</span>
              <span>${escapeHtml(m.provider)}</span>
              <span class="or-dot">·</span>
              <span>${fmtCtx(m.contextLength)} ctx</span>
            </div>
          </div>
          <div class="or-card-rates">
            <label class="or-rate">
              <span>In $/1M</span>
              <input class="price-input" data-field="in" data-model="${id}" type="number" step="0.0001" min="0" value="${Number(rates.input)}" />
            </label>
            <label class="or-rate">
              <span>Out $/1M</span>
              <input class="price-input" data-field="out" data-model="${id}" type="number" step="0.0001" min="0" value="${Number(rates.output)}" />
            </label>
          </div>
        </article>`;
      }).join('') + more;
    }

    function scheduleRender() {
      if (renderTimer) clearTimeout(renderTimer);
      renderTimer = setTimeout(() => {
        renderTimer = 0;
        renderList();
      }, 80);
    }

    function fillProviders() {
      const set = new Set(openrouter.map((m) => m.provider).filter(Boolean));
      const sel = $('providerFilter');
      const cur = sel.value;
      sel.innerHTML = '<option value="">All providers</option>' +
        [...set].sort().map((p) => `<option value="${escapeHtml(p)}">${escapeHtml(p)}</option>`).join('');
      if (cur && set.has(cur)) sel.value = cur;
    }

    async function loadMeta() {
      try {
        const health = await fetch('/api/health').then((r) => r.json());
        const n = health.agentsDetected?.length || 0;
        $('meta').textContent = `v${health.version} · ${n} agents · ${health.eventCount || 0} events`;
      } catch {
        $('meta').innerHTML = '<span class="err">API offline</span>';
      }
    }

    async function loadPricing(opts = {}) {
      const refresh = opts.refresh === true;
      setStatus(refresh ? 'Fetching OpenRouter…' : 'Loading…');
      try {
        const q = refresh ? '?refreshOpenRouter=1' : '';
        const data = await fetch('/api/pricing' + q).then((r) => r.json());
        openrouter = Array.isArray(data.openrouter) ? data.openrouter : [];
        customRates = data.customRates || {};
        seenSet = new Set((data.seenModels || []).map((m) => String(m).toLowerCase()));
        // Also add short names from seen
        for (const s of [...seenSet]) {
          if (s.includes('/')) seenSet.add(s.slice(s.lastIndexOf('/') + 1));
        }
        $('pricingPath').textContent = data.configPath || 'config.json';
        fillProviders();
        renderList();
        const when = data.openrouterFetchedAt
          ? new Date(data.openrouterFetchedAt).toLocaleString()
          : '—';
        setStatus(`${openrouter.length} OpenRouter · ${Object.keys(customRates).length} custom · ${when}`);
        if (!openrouter.length) {
          $('modelList').innerHTML = '<div class="empty">No OpenRouter models yet. Click Refresh.</div>';
        }
      } catch {
        setStatus('Load failed');
        $('modelList').innerHTML = '<div class="empty">Failed to load models</div>';
      }
    }

    function collectDraftFromDom() {
      $('modelList').querySelectorAll('.or-card[data-id]').forEach((card) => {
        const model = (card.getAttribute('data-id') || '').toLowerCase();
        if (!model) return;
        pricingDraft[model] = {
          inputPer1M: Number(card.querySelector('[data-field="in"]')?.value) || 0,
          outputPer1M: Number(card.querySelector('[data-field="out"]')?.value) || 0,
        };
      });
    }

    let liveTimer = null;
    let liveSaving = false;
    let liveQueued = false;

    async function pushRatesLive(opts = {}) {
      const { manual = false } = opts;
      if (liveSaving) {
        liveQueued = true;
        return;
      }
      collectDraftFromDom();
      const custom = { ...customRates, ...pricingDraft };
      liveSaving = true;
      if (manual) $('pricingSave').disabled = true;
      setStatus(manual ? 'Saving…' : 'Updating…');
      try {
        const res = await fetch('/api/pricing', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ customRates: custom, replace: true, live: !manual }),
        }).then((r) => r.json());
        pricingDraft = {};
        customRates = res.customRates || {};
        setStatus(manual
          ? `Saved · ${Object.keys(customRates).length} custom`
          : `Live · ${Object.keys(customRates).length} custom`);
        // patch openrouter sources without full refetch
        openrouter = openrouter.map((m) => {
          const c = customRates[m.id.toLowerCase()] || customRates[(m.slug || '').toLowerCase()];
          return {
            ...m,
            source: c ? 'custom' : 'openrouter',
            inputPer1M: c?.inputPer1M ?? m.inputPer1M,
            outputPer1M: c?.outputPer1M ?? m.outputPer1M,
          };
        });
        renderList();
      } catch {
        setStatus(manual ? 'Save failed' : 'Update failed');
      } finally {
        liveSaving = false;
        if (manual) $('pricingSave').disabled = false;
        if (liveQueued) {
          liveQueued = false;
          void pushRatesLive({ manual: false });
        }
      }
    }

    function scheduleLivePush() {
      if (liveTimer) clearTimeout(liveTimer);
      liveTimer = setTimeout(() => void pushRatesLive({ manual: false }), 500);
    }

    $('modelList').addEventListener('input', (e) => {
      const inp = e.target.closest('.price-input');
      if (!inp) return;
      const model = (inp.getAttribute('data-model') || '').toLowerCase();
      if (!model) return;
      const card = inp.closest('.or-card');
      pricingDraft[model] = {
        inputPer1M: Number(card.querySelector('[data-field="in"]')?.value) || 0,
        outputPer1M: Number(card.querySelector('[data-field="out"]')?.value) || 0,
      };
      setStatus('Typing…');
      scheduleLivePush();
    });

    $('priceSearch').oninput = scheduleRender;
    $('providerFilter').onchange = renderList;
    $('sortFilter').onchange = renderList;

    document.querySelector('.or-filter-group').onclick = (e) => {
      const btn = e.target.closest('.or-chip');
      if (!btn) return;
      quickFilter = btn.getAttribute('data-filter') || 'all';
      document.querySelectorAll('.or-chip').forEach((b) => b.classList.toggle('active', b === btn));
      renderList();
    };

    $('priceAdd').onclick = () => {
      const raw = ($('priceModel').value || '').trim();
      const model = raw.includes('/') ? raw : (normalizeModelName(raw) || raw);
      if (!model) return;
      const key = model.toLowerCase();
      pricingDraft[key] = {
        inputPer1M: Number($('priceIn').value) || 0,
        outputPer1M: Number($('priceOut').value) || 0,
      };
      // Ensure visible in list
      if (!openrouter.some((m) => m.id.toLowerCase() === key || (m.slug || '').toLowerCase() === key)) {
        openrouter.unshift({
          id: model,
          name: model,
          provider: model.includes('/') ? model.split('/')[0] : 'custom',
          slug: model.includes('/') ? model.split('/').pop() : model,
          contextLength: 0,
          modality: 'text->text',
          free: false,
          source: 'draft',
          inputPer1M: pricingDraft[key].inputPer1M,
          outputPer1M: pricingDraft[key].outputPer1M,
        });
      }
      $('priceModel').value = '';
      $('priceIn').value = '';
      $('priceOut').value = '';
      renderList();
      scheduleLivePush();
    };

    $('pricingReload').onclick = async () => {
      if (liveTimer) clearTimeout(liveTimer);
      pricingDraft = {};
      try {
        await fetch('/api/models/refresh', { method: 'POST' });
      } catch { /* ignore */ }
      await loadPricing({ refresh: true });
    };

    $('pricingSave').onclick = async () => {
      if (liveTimer) clearTimeout(liveTimer);
      await pushRatesLive({ manual: true });
    };

    loadMeta();
    loadPricing();
  </script>
</body>
</html>
