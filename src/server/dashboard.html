<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>XLab Token</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #121a2b;
      --text: #e8eefc;
      --muted: #93a0b8;
      --accent: #00a19a;
      --border: #243049;
      --warn: #f0b429;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #163044 0%, transparent 50%), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    h1 { font-size: 1.15rem; margin: 0; letter-spacing: 0.02em; }
    h1 span { color: var(--accent); }
    .muted { color: var(--muted); font-size: 0.9rem; }
    main { padding: 1.25rem 1.5rem 2rem; max-width: 1100px; margin: 0 auto; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 0.85rem; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
    }
    .card .label { color: var(--muted); font-size: 0.8rem; margin-bottom: 0.35rem; }
    .card .value { font-size: 1.35rem; font-weight: 650; }
    .toolbar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin: 1rem 0; }
    button, select {
      background: #182338;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
    }
    button:hover { border-color: var(--accent); }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { text-align: left; padding: 0.55rem 0.4rem; border-bottom: 1px solid var(--border); font-size: 0.92rem; }
    th { color: var(--muted); font-weight: 600; }
    .bar {
      height: 8px; background: #1c2740; border-radius: 99px; overflow: hidden; min-width: 80px;
    }
    .bar > i { display: block; height: 100%; background: linear-gradient(90deg, var(--accent), #3dd6ce); }
    .pill {
      display: inline-block; padding: 0.15rem 0.5rem; border-radius: 999px;
      background: #18332f; color: #7dfff5; font-size: 0.75rem;
    }
    .err { color: #ff8e8e; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>XLab <span>Token</span></h1>
      <div class="muted">Local token API usage & cost · all agents on this machine</div>
    </div>
    <div class="muted" id="meta">Loading…</div>
  </header>
  <main>
    <div class="toolbar">
      <select id="since">
        <option value="24h">Last 24h</option>
        <option value="7d" selected>Last 7d</option>
        <option value="30d">Last 30d</option>
        <option value="">All time</option>
      </select>
      <select id="groupBy">
        <option value="agent" selected>By agent</option>
        <option value="model">By model</option>
        <option value="day">By day</option>
      </select>
      <button id="refresh">Refresh</button>
      <button id="scan">Rescan</button>
    </div>

    <div class="grid" id="kpis"></div>

    <section class="card" style="margin-top:1rem">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap">
        <strong>Breakdown</strong>
        <span class="pill" id="sortLabel">sorted by cost</span>
      </div>
      <table>
        <thead>
          <tr>
            <th>Key</th>
            <th>Tokens</th>
            <th>Cost (USD)</th>
            <th>Share</th>
          </tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </section>

    <section class="card" style="margin-top:1rem">
      <strong>Detected agents</strong>
      <table>
        <thead>
          <tr><th>Agent</th><th>Status</th><th>Events</th><th>Paths</th></tr>
        </thead>
        <tbody id="agents"></tbody>
      </table>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => {
      if (n >= 1e9) return (n/1e9).toFixed(2) + 'B';
      if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
      if (n >= 1e3) return (n/1e3).toFixed(1) + 'K';
      return String(Math.round(n));
    };
    const money = (n) => '$' + (n || 0).toFixed(4);

    async function load() {
      const since = $('since').value;
      const groupBy = $('groupBy').value;
      const q = new URLSearchParams({ groupBy, sort: 'cost' });
      if (since) q.set('since', since);
      try {
        const [stats, agents, health] = await Promise.all([
          fetch('/api/stats?' + q).then(r => r.json()),
          fetch('/api/agents').then(r => r.json()),
          fetch('/api/health').then(r => r.json()),
        ]);
        const t = stats.totals || {};
        $('meta').textContent = `v${health.version} · ${health.agentsDetected?.length || 0} agents detected · localhost only`;
        $('kpis').innerHTML = `
          <div class="card"><div class="label">Total tokens</div><div class="value">${fmt(t.totalTokens || 0)}</div></div>
          <div class="card"><div class="label">Input</div><div class="value">${fmt(t.inputTokens || 0)}</div></div>
          <div class="card"><div class="label">Output</div><div class="value">${fmt(t.outputTokens || 0)}</div></div>
          <div class="card"><div class="label">Est. cost</div><div class="value">${money(t.estimatedCost || 0)}</div></div>
          <div class="card"><div class="label">Events</div><div class="value">${fmt(t.eventCount || 0)}</div></div>
        `;
        const maxCost = Math.max(1, ...(stats.groups || []).map(g => g.estimatedCost || 0));
        $('rows').innerHTML = (stats.groups || []).map(g => `
          <tr>
            <td><code>${g.key}</code></td>
            <td>${fmt(g.totalTokens || 0)}</td>
            <td>${money(g.estimatedCost || 0)}</td>
            <td><div class="bar"><i style="width:${Math.round(((g.estimatedCost||0)/maxCost)*100)}%"></i></div></td>
          </tr>
        `).join('') || '<tr><td colspan="4" class="muted">No usage events found yet. Use AI agents, then Rescan.</td></tr>';

        $('agents').innerHTML = (agents.agents || []).map(a => `
          <tr>
            <td>${a.label} <span class="muted">(${a.id})</span></td>
            <td>${a.detected ? (a.enabled ? 'detected' : 'detected / parser pending') : 'not found'}</td>
            <td>${a.eventCount}</td>
            <td class="muted" style="max-width:360px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(a.paths||[]).join(', ') || '—'}</td>
          </tr>
        `).join('');
      } catch (e) {
        $('meta').innerHTML = '<span class="err">Failed to load API</span>';
      }
    }

    $('refresh').onclick = load;
    $('since').onchange = load;
    $('groupBy').onchange = load;
    $('scan').onclick = async () => {
      $('scan').disabled = true;
      await fetch('/api/scan', { method: 'POST' });
      $('scan').disabled = false;
      await load();
    };
    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
