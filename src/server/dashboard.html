<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard · XLab Token</title>
  <!-- Same icon as XLab_Web title bar (layout.tsx → /images/misc/topup.png) -->
  <link rel="icon" type="image/png" href="/assets/favicon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon-16x16.png" />
  <link rel="shortcut icon" href="/assets/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">
        <a class="brand-logo-wrap" href="/" title="XLab Token" aria-label="XLab Token">
          <img class="brand-logo" src="/assets/logo.png" alt="XLab Token" width="140" height="56"
            onerror="this.style.display='none'; document.querySelector('.brand-mark').style.display='flex';" />
          <div class="brand-mark" aria-hidden="true"><span class="x">X</span><span class="lab">Lab</span></div>
        </a>
      </div>
      <nav class="nav" aria-label="Main">
        <a class="nav-link active" href="/">Dashboard</a>
        <a class="nav-link" href="/agents">Agents</a>
        <a class="nav-link" href="/pricing">Pricing</a>
        <a class="nav-link" href="/settings">Settings</a>
      </nav>
      <div class="top-actions">
        <span class="meta-chip" id="meta">Loading…</span>
        <button class="icon-btn" id="themeBtn" type="button" title="Toggle theme" aria-label="Toggle theme"></button>
        <a class="icon-btn settings-btn" id="settingsBtn" href="/settings" title="Settings" aria-label="Settings"></a>
      </div>
    </div>
  </header>

  <main class="shell usage-page">
    <!-- Toolbar: period + actions (9router Usage style) -->
    <div class="usage-toolbar">
      <div class="seg" id="periodSeg" role="tablist" aria-label="Time range">
        <button type="button" class="seg-btn active" data-period="today">Today</button>
        <button type="button" class="seg-btn" data-period="24h">24h</button>
        <button type="button" class="seg-btn" data-period="7d">7D</button>
        <button type="button" class="seg-btn" data-period="30d">30D</button>
        <button type="button" class="seg-btn" data-period="">All</button>
      </div>
      <div class="usage-actions">
        <span class="fetch-spin hidden" id="fetchSpin" aria-hidden="true"></span>
        <button class="btn btn-primary btn-with-icon" id="refresh" type="button" title="Rescan agents and reload stats">Refresh</button>
      </div>
    </div>

    <!-- Overview cards -->
    <div class="overview-grid" id="overview"></div>

    <!-- Chart + Recent -->
    <div class="usage-mid">
      <section class="u-card chart-card">
        <div class="chart-head">
          <div class="seg seg-sm" id="chartMode" role="tablist" aria-label="Chart metric">
            <button type="button" class="seg-btn active" data-mode="tokens">Tokens</button>
            <button type="button" class="seg-btn" data-mode="cost">Cost</button>
          </div>
        </div>
        <div class="chart-body" id="chartBody">
          <div class="chart-empty">Loading…</div>
        </div>
      </section>

      <section class="u-card recent-card">
        <div class="u-card-head">
          <span class="u-card-title">Recent events</span>
        </div>
        <div class="recent-scroll" id="recentBody">
          <div class="chart-empty">Loading…</div>
        </div>
      </section>
    </div>

    <!-- Breakdown table -->
    <div class="table-toolbar">
      <div class="seg seg-sm" id="groupSeg" role="tablist" aria-label="Group by">
        <button type="button" class="seg-btn active" data-group="agent">By agent</button>
        <button type="button" class="seg-btn" data-group="model">By model</button>
        <button type="button" class="seg-btn" data-group="day" id="groupTimeBtn">By day</button>
      </div>
      <div class="seg seg-sm" id="viewModeSeg" role="tablist" aria-label="Value mode">
        <button type="button" class="seg-btn active" data-view="costs">Costs</button>
        <button type="button" class="seg-btn" data-view="tokens">Tokens</button>
      </div>
    </div>

    <section class="u-card table-card">
      <div class="table-scroll">
        <table class="usage-table" id="usageTable">
          <thead id="tableHead"></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </section>

    <footer>
      <div>Layout inspired by <strong>9router Usage</strong> · accent XLab teal</div>
      <div>localhost only · estimated cost, not billing</div>
    </footer>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const fmt = (n) => {
      const v = Number(n) || 0;
      if (v >= 1e9) return (v / 1e9).toFixed(2) + 'B';
      if (v >= 1e6) return (v / 1e6).toFixed(2) + 'M';
      if (v >= 1e3) return (v / 1e3).toFixed(1) + 'K';
      return String(Math.round(v));
    };
    const fmtFull = (n) => new Intl.NumberFormat().format(Math.round(Number(n) || 0));
    /** USD with thousand separators: $197.527,96 (dot groups, comma decimals) */
    const money = (n, digits = 2) => {
      const v = Number(n) || 0;
      const neg = v < 0;
      const fixed = Math.abs(v).toFixed(digits);
      const [intPart, decPart] = fixed.split('.');
      const grouped = intPart.replace(/\B(?=(\d{3})+(?!\d))/g, '.');
      return (neg ? '-$' : '$') + grouped + (decPart != null ? ',' + decPart : '');
    };
    const money4 = (n) => money(n, 4);

    function escapeHtml(s) {
      return String(s ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    /** Universal outline icons (Heroicons-style) — easy to recognize */
    const ICONS = {
      moon: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 14.5A8.5 8.5 0 0 1 9.5 3 7 7 0 1 0 21 14.5z"/></svg>',
      sun: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>',
      settings: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>',
      refresh: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/></svg>',
      scan: '<svg class="ui-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M3 7V5a2 2 0 0 1 2-2h2M17 3h2a2 2 0 0 1 2 2v2M21 17v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2"/><path d="M7 12h10"/></svg>',
    };

    function applyTheme(mode) {
      document.documentElement.classList.toggle('dark', mode === 'dark');
      localStorage.setItem('xlab-token-theme', mode);
      const btn = $('themeBtn');
      btn.innerHTML = mode === 'dark' ? ICONS.sun : ICONS.moon;
      btn.title = mode === 'dark' ? 'Light mode' : 'Dark mode';
      btn.setAttribute('aria-label', mode === 'dark' ? 'Switch to light mode' : 'Switch to dark mode');
    }
    applyTheme(localStorage.getItem('xlab-token-theme') === 'dark' ? 'dark' : 'light');
    $('settingsBtn').innerHTML = ICONS.settings;
    function setRefreshIdle() {
      $('refresh').disabled = false;
      $('refresh').innerHTML = ICONS.refresh + '<span>Refresh</span>';
    }
    function setRefreshBusy(label) {
      $('refresh').disabled = true;
      $('refresh').innerHTML = ICONS.refresh + '<span>' + label + '</span>';
    }
    setRefreshIdle();
    $('themeBtn').onclick = () => {
      applyTheme(document.documentElement.classList.contains('dark') ? 'light' : 'dark');
    };

    const state = {
      period: 'today',
      groupBy: 'agent',
      viewMode: 'costs',
      chartMode: 'tokens',
      daySeries: [],
      chartByHour: false,
      groups: [],
      totals: null,
      scanning: false,
      awaitingData: true, // until first non-empty scan or confirmed idle empty
      scanRevision: 0,
      lastEventCount: 0,
      loading: false,
    };
    let pricingRevision = 0;

    function isHourlyPeriod() {
      return state.period === 'today' || state.period === '24h';
    }

    function sinceParam() {
      if (state.period === 'today') {
        const d = new Date();
        d.setHours(0, 0, 0, 0);
        return d.toISOString();
      }
      return state.period || '';
    }

    /** Parse relative (7d/24h) or ISO since — mirrors server parseSince. */
    function parseSinceMs(since) {
      if (!since) return null;
      const m = String(since).match(/^(\d+)([smhd])$/i);
      if (m) {
        const n = Number(m[1]);
        const unit = m[2].toLowerCase();
        const ms =
          unit === 's' ? n * 1000 :
          unit === 'm' ? n * 60_000 :
          unit === 'h' ? n * 3_600_000 :
          n * 86_400_000;
        return Date.now() - ms;
      }
      const t = new Date(since).getTime();
      return Number.isNaN(t) ? null : t;
    }

    /** Match aggregate.ts hour key: UTC `YYYY-MM-DDTHH:00` */
    function hourKeyFromDate(d) {
      return d.toISOString().slice(0, 13) + ':00';
    }

    function parseHourKey(key) {
      const s = String(key || '');
      if (/^\d{4}-\d{2}-\d{2}T\d{2}:00$/.test(s)) return new Date(s + ':00.000Z');
      return new Date(s);
    }

    function formatHourLabel(key, withDate) {
      const d = parseHourKey(key);
      if (Number.isNaN(d.getTime())) return String(key || '—');
      if (withDate) {
        return d.toLocaleString(undefined, {
          month: 'short', day: 'numeric',
          hour: '2-digit', minute: '2-digit', hour12: false,
        });
      }
      return d.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit', hour12: false });
    }

    /** Strip provider suffixes so "gpt-5.5 (openai-compatible-…)" → "gpt-5.5" */
    function normalizeModelName(model) {
      if (model == null) return '';
      let m = String(model).trim();
      if (!m) return '';
      for (let i = 0; i < 3; i++) {
        const next = m.replace(/\s*\([^)]*\)\s*$/g, '').trim();
        if (next === m) break;
        m = next;
      }
      m = m.replace(/\s*\[[^\]]*\]\s*$/g, '').trim();
      if (m.includes('|')) m = m.split('|')[0].trim();
      if (m.includes('/') && !m.startsWith('http')) {
        const parts = m.split('/').map((p) => p.trim()).filter(Boolean);
        const last = parts[parts.length - 1] || m;
        if (last && last.length >= 2 && !/^(models?|v\d+)$/i.test(last)) m = last;
      }
      return m.replace(/\s+/g, ' ').replace(/[-_:|]+$/g, '').trim();
    }

    function formatGroupKey(key) {
      if (state.groupBy === 'hour' || /^\d{4}-\d{2}-\d{2}T\d{2}:00$/.test(String(key || ''))) {
        return formatHourLabel(key, true);
      }
      if (state.groupBy === 'model') {
        return normalizeModelName(key) || String(key ?? '');
      }
      return String(key ?? '');
    }

    /** Fill missing hours so Today/24h chart is continuous. */
    function fillHourSeries(groups, period) {
      const byKey = new Map((groups || []).map((g) => [g.key, g]));
      const blank = (key) => ({
        key,
        totalTokens: 0,
        estimatedCost: 0,
        eventCount: 0,
        inputTokens: 0,
        outputTokens: 0,
        cacheReadTokens: 0,
        cacheWriteTokens: 0,
      });
      const end = new Date();
      end.setMinutes(0, 0, 0);
      let start;
      if (period === 'today') {
        start = new Date();
        start.setHours(0, 0, 0, 0);
      } else {
        start = new Date(end.getTime() - 23 * 3_600_000);
      }
      const out = [];
      for (let t = start.getTime(); t <= end.getTime(); t += 3_600_000) {
        const key = hourKeyFromDate(new Date(t));
        out.push(byKey.get(key) || blank(key));
      }
      return out;
    }

    function syncTimeGroupButton() {
      const btn = $('groupTimeBtn');
      if (!btn) return;
      if (isHourlyPeriod()) {
        btn.setAttribute('data-group', 'hour');
        btn.textContent = 'By hour';
        if (state.groupBy === 'day') state.groupBy = 'hour';
      } else {
        btn.setAttribute('data-group', 'day');
        btn.textContent = 'By day';
        if (state.groupBy === 'hour') state.groupBy = 'day';
      }
      setActive($('groupSeg'), 'data-group', state.groupBy);
    }

    function setActive(segEl, attr, value) {
      segEl.querySelectorAll('.seg-btn').forEach((b) => {
        b.classList.toggle('active', b.getAttribute(attr) === value || (value === '' && b.getAttribute(attr) === ''));
      });
    }

    function overviewCard(label, value, tone, hint) {
      return `<div class="ov-card">
        <span class="ov-label">${label}</span>
        <span class="ov-value ${tone || ''}">${value}</span>
        ${hint ? `<span class="ov-hint">${hint}</span>` : ''}
      </div>`;
    }

    function renderOverview(t) {
      const cache = (t.cacheReadTokens || 0) + (t.cacheWriteTokens || 0);
      $('overview').innerHTML = [
        overviewCard('Total events', fmtFull(t.eventCount || 0)),
        overviewCard('Input tokens', fmtFull(t.inputTokens || 0), 'tone-primary'),
        overviewCard('Cached tokens', fmtFull(cache), 'tone-info'),
        overviewCard('Output tokens', fmtFull(t.outputTokens || 0), 'tone-success'),
        overviewCard('Est. cost', '~' + money(t.estimatedCost || 0), 'tone-warn', 'Estimated, not actual billing'),
      ].join('');
    }

    function timeAgo(iso) {
      if (!iso) return '—';
      const mins = Math.floor((Date.now() - new Date(iso).getTime()) / 60000);
      if (mins < 1) return 'Just now';
      if (mins < 60) return mins + 'm ago';
      if (mins < 1440) return Math.floor(mins / 60) + 'h ago';
      return new Date(iso).toLocaleDateString();
    }

    function emptyMsg(kind) {
      if (state.scanning || state.awaitingData) {
        return kind === 'table'
          ? 'Đang quét agents… dữ liệu sẽ hiện ngay khi xong.'
          : 'Scanning agents…';
      }
      if (kind === 'chart') return 'No data for this period';
      if (kind === 'table') return 'Chưa có usage. Dùng AI agents rồi bấm Refresh.';
      return 'No events yet.';
    }

    function renderRecent(events) {
      if (!events.length) {
        $('recentBody').innerHTML = `<div class="chart-empty">${emptyMsg('recent')}</div>`;
        return;
      }
      $('recentBody').innerHTML = `
        <ul class="recent-list">
          ${events.map((e) => {
            const model = normalizeModelName(e.model) || e.agent || '—';
            const agent = e.agent && e.model ? e.agent : '';
            return `<li class="recent-item">
              <div class="recent-item-main">
                <span class="recent-model" title="${escapeHtml(model)}">${escapeHtml(model)}</span>
                ${agent ? `<span class="recent-agent">${escapeHtml(agent)}</span>` : ''}
              </div>
              <div class="recent-item-meta">
                <span class="recent-tokens" title="input / output">
                  <span>${fmt(e.inputTokens)}</span><span class="recent-sep">/</span><span>${fmt(e.outputTokens)}</span>
                </span>
                <time class="recent-when" datetime="${escapeHtml(e.timestamp || '')}">${timeAgo(e.timestamp)}</time>
              </div>
            </li>`;
          }).join('')}
        </ul>`;
    }

    function renderChart() {
      const series = state.daySeries;
      const mode = state.chartMode;
      const vals = series.map((d) => mode === 'tokens' ? (d.totalTokens || 0) : (d.estimatedCost || 0));
      const has = vals.some((v) => v > 0);
      if (!has) {
        $('chartBody').innerHTML = `<div class="chart-empty">${emptyMsg('chart')}</div>`;
        return;
      }

      const W = 640, H = 200, PL = 44, PR = 12, PT = 12, PB = 28;
      const iw = W - PL - PR, ih = H - PT - PB;
      const max = Math.max(...vals, mode === 'tokens' ? 1 : 0.0001);
      const n = series.length;
      const xAt = (i) => PL + (n <= 1 ? iw / 2 : (i / (n - 1)) * iw);
      const yAt = (v) => PT + ih - (v / max) * ih;

      const pts = series.map((d, i) => {
        const v = mode === 'tokens' ? (d.totalTokens || 0) : (d.estimatedCost || 0);
        return [xAt(i), yAt(v)];
      });
      const line = pts.map((p, i) => (i ? 'L' : 'M') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');
      const area = line + ` L${pts[pts.length - 1][0].toFixed(1)},${(PT + ih).toFixed(1)} L${pts[0][0].toFixed(1)},${(PT + ih).toFixed(1)} Z`;
      const stroke = mode === 'tokens' ? 'var(--chart-tokens)' : 'var(--chart-cost)';
      const fillId = mode === 'tokens' ? 'gradTok' : 'gradCost';
      const fillFrom = mode === 'tokens' ? 'rgba(99,102,241,0.28)' : 'rgba(245,158,11,0.28)';

      const yTicks = [0, 0.5, 1].map((t) => {
        const v = max * t;
        const y = yAt(v);
        const label = mode === 'tokens' ? fmt(v) : money4(v);
        return `<line x1="${PL}" y1="${y}" x2="${W - PR}" y2="${y}" class="chart-grid" />
          <text x="${PL - 6}" y="${y + 3}" class="chart-tick" text-anchor="end">${label}</text>`;
      }).join('');

      const xLabels = series.map((d, i) => {
        const step = n > 14 ? Math.ceil(n / 8) : (n > 10 ? 2 : 1);
        if (n > 8 && i % step !== 0 && i !== n - 1 && i !== 0) return '';
        const label = state.chartByHour
          ? formatHourLabel(d.key, false)
          : String(d.key || '').slice(5); // MM-DD
        return `<text x="${xAt(i)}" y="${H - 8}" class="chart-tick" text-anchor="middle">${escapeHtml(label)}</text>`;
      }).join('');

      $('chartBody').innerHTML = `
        <svg class="usage-chart" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Usage chart">
          <defs>
            <linearGradient id="gradTok" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="${fillFrom}" />
              <stop offset="95%" stop-color="rgba(99,102,241,0)" />
            </linearGradient>
            <linearGradient id="gradCost" x1="0" y1="0" x2="0" y2="1">
              <stop offset="5%" stop-color="${fillFrom}" />
              <stop offset="95%" stop-color="rgba(245,158,11,0)" />
            </linearGradient>
          </defs>
          ${yTicks}
          <path d="${area}" fill="url(#${fillId})" />
          <path d="${line}" fill="none" stroke="${stroke}" stroke-width="2" vector-effect="non-scaling-stroke" />
          ${xLabels}
        </svg>`;
    }

    function renderTable() {
      const costs = state.viewMode === 'costs';
      const head = costs
        ? ['Key', 'Events', 'Input $', 'Output $', 'Total $']
        : ['Key', 'Events', 'Input', 'Cached', 'Output', 'Total'];
      $('tableHead').innerHTML = `<tr>${head.map((h, i) =>
        `<th class="${i ? 'num' : ''}">${h}</th>`).join('')}</tr>`;

      const groups = state.groups;
      if (!groups.length) {
        $('tableBody').innerHTML = `<tr><td colspan="${head.length}"><div class="empty">${emptyMsg('table')}</div></td></tr>`;
        return;
      }

      // Split cost by token share (same approach as 9router UsageTable)
      $('tableBody').innerHTML = groups.map((g) => {
        const input = g.inputTokens || 0;
        const output = g.outputTokens || 0;
        const cache = (g.cacheReadTokens || 0) + (g.cacheWriteTokens || 0);
        const totalTok = g.totalTokens || (input + output + cache) || 1;
        const cost = g.estimatedCost || 0;
        const inputShare = Math.max(0, input - cache);
        const inputCost = cost * (inputShare / totalTok);
        const outCost = cost * (output / totalTok);

        const label = formatGroupKey(g.key);
        if (costs) {
          return `<tr>
            <td><code title="${escapeHtml(g.key)}">${escapeHtml(label)}</code></td>
            <td class="num muted">${fmtFull(g.eventCount || 0)}</td>
            <td class="num muted">${money(inputCost)}</td>
            <td class="num muted">${money(outCost)}</td>
            <td class="num toned-cost"><strong>${money(cost)}</strong></td>
          </tr>`;
        }
        return `<tr>
          <td><code title="${escapeHtml(g.key)}">${escapeHtml(label)}</code></td>
          <td class="num muted">${fmtFull(g.eventCount || 0)}</td>
          <td class="num muted">${fmtFull(input)}</td>
          <td class="num muted">${cache ? fmtFull(cache) : '—'}</td>
          <td class="num muted">${fmtFull(output)}</td>
          <td class="num"><strong>${fmtFull(g.totalTokens || 0)}</strong></td>
        </tr>`;
      }).join('');
    }

    async function load(opts = {}) {
      const quiet = opts.quiet === true;
      if (state.loading && quiet) return; // avoid piling quiet reloads
      state.loading = true;
      if (!quiet) $('fetchSpin').classList.remove('hidden');
      syncTimeGroupButton();
      const since = sinceParam();
      const hourly = isHourlyPeriod();
      state.chartByHour = hourly;

      const tableSort = (state.groupBy === 'hour' || state.groupBy === 'day')
        ? 'tokens'
        : (state.viewMode === 'tokens' ? 'tokens' : 'cost');
      const qStats = new URLSearchParams({ groupBy: state.groupBy, sort: tableSort });
      const seriesBy = hourly ? 'hour' : 'day';
      const qSeries = new URLSearchParams({ groupBy: seriesBy, sort: 'tokens' });
      if (since) { qStats.set('since', since); qSeries.set('since', since); }

      try {
        // Pass since to /api/events so server filters with parseSince (7d/24h/…),
        // not new Date("7d") which is Invalid Date and drops every event.
        const qEvents = new URLSearchParams({ limit: '40' });
        if (since) qEvents.set('since', since);

        const [stats, seriesStats, health, eventsRes] = await Promise.all([
          fetch('/api/stats?' + qStats).then((r) => r.json()),
          fetch('/api/stats?' + qSeries).then((r) => r.json()),
          fetch('/api/health').then((r) => r.json()),
          fetch('/api/events?' + qEvents).then((r) => r.json()),
        ]);

        state.totals = stats.totals || {};
        let groups = stats.groups || [];
        // Chronological for time buckets
        if (state.groupBy === 'hour' || state.groupBy === 'day') {
          groups = groups.slice().sort((a, b) => String(a.key).localeCompare(String(b.key)));
        }
        state.groups = groups;

        const rawSeries = (seriesStats.groups || []).slice().sort((a, b) => String(a.key).localeCompare(String(b.key)));
        state.daySeries = hourly ? fillHourSeries(rawSeries, state.period) : rawSeries;

        const eventCount = health.eventCount || 0;
        const detected = health.agentsDetected?.length || 0;
        state.scanning = Boolean(health.scanning);
        if (typeof health.scanRevision === 'number') state.scanRevision = health.scanRevision;
        if (typeof health.pricingRevision === 'number') pricingRevision = health.pricingRevision;
        // First boot / empty cache: keep polling until first scan finishes
        state.awaitingData = state.scanning || (eventCount === 0 && state.scanRevision === 0);
        state.lastEventCount = eventCount;

        const scanHint = state.scanning ? ' · scanning…' : (state.awaitingData ? ' · waiting…' : '');
        $('meta').textContent = `v${health.version} · ${detected} agents · ${fmt(eventCount)} events${scanHint}`;

        renderOverview(state.totals);
        renderChart();
        renderTable();

        let recent = Array.isArray(eventsRes.events) ? eventsRes.events : [];
        // Client-side safety net if an older server build lacks since support
        const t0 = parseSinceMs(since);
        if (t0 != null) {
          recent = recent.filter((e) => {
            const t = new Date(e.timestamp).getTime();
            return !Number.isNaN(t) && t >= t0;
          });
        }
        // Ensure newest-first even if response order varies
        recent = recent
          .slice()
          .sort((a, b) => new Date(b.timestamp).getTime() - new Date(a.timestamp).getTime());
        renderRecent(recent.slice(0, 25));

        scheduleScanPoll();
      } catch {
        if (!quiet) $('meta').innerHTML = '<span class="err">Failed to load API</span>';
        // Still retry while bootstrapping empty UI
        if (state.awaitingData || state.scanning) scheduleScanPoll();
      } finally {
        state.loading = false;
        $('fetchSpin').classList.add('hidden');
      }
    }

    let scanPollTimer = 0;
    function scheduleScanPoll() {
      if (scanPollTimer) clearTimeout(scanPollTimer);
      if (!state.scanning && !state.awaitingData) return;
      scanPollTimer = setTimeout(() => {
        scanPollTimer = 0;
        void load({ quiet: true });
      }, 1200);
    }

    // Segment handlers
    $('periodSeg').onclick = (e) => {
      const b = e.target.closest('.seg-btn');
      if (!b) return;
      state.period = b.getAttribute('data-period') ?? 'today';
      setActive($('periodSeg'), 'data-period', state.period);
      syncTimeGroupButton();
      load();
    };
    $('chartMode').onclick = (e) => {
      const b = e.target.closest('.seg-btn');
      if (!b) return;
      state.chartMode = b.getAttribute('data-mode') || 'tokens';
      setActive($('chartMode'), 'data-mode', state.chartMode);
      renderChart();
    };
    $('groupSeg').onclick = (e) => {
      const b = e.target.closest('.seg-btn');
      if (!b) return;
      state.groupBy = b.getAttribute('data-group') || 'agent';
      setActive($('groupSeg'), 'data-group', state.groupBy);
      load();
    };
    $('viewModeSeg').onclick = (e) => {
      const b = e.target.closest('.seg-btn');
      if (!b) return;
      state.viewMode = b.getAttribute('data-view') || 'costs';
      setActive($('viewModeSeg'), 'data-view', state.viewMode);
      load();
    };

    // Single action: rescan local agents + reload dashboard
    $('refresh').onclick = async () => {
      setRefreshBusy('Refreshing…');
      try {
        await fetch('/api/scan', { method: 'POST' });
        await load({ quiet: true });
      } finally {
        setRefreshIdle();
      }
    };

    load();
    setInterval(() => void load({ quiet: true }), 30000);

    // Realtime: pricing rate changes + scan completion (fills empty bootstrap UI)
    function watchLiveStream() {
      try {
        const es = new EventSource('/api/pricing/stream');
        es.onmessage = (ev) => {
          try {
            const msg = JSON.parse(ev.data);
            if (msg.type === 'hello') {
              pricingRevision = msg.pricingRevision || msg.revision || 0;
              if (typeof msg.scanRevision === 'number') state.scanRevision = msg.scanRevision;
              state.scanning = Boolean(msg.scanning);
              if (msg.scanning || (msg.eventCount || 0) === 0) {
                state.awaitingData = true;
                scheduleScanPoll();
              }
              return;
            }
            if (msg.type === 'pricing' && msg.revision && msg.revision !== pricingRevision) {
              pricingRevision = msg.revision;
              void load({ quiet: true });
              return;
            }
            if (msg.type === 'scan') {
              const rev = msg.revision || 0;
              const wasScanning = state.scanning;
              state.scanning = Boolean(msg.scanning);
              if (msg.reason === 'start') {
                state.awaitingData = state.awaitingData || state.lastEventCount === 0;
                scheduleScanPoll();
                return;
              }
              // Scan finished (or error idle) — always reload so empty UI fills
              if (rev !== state.scanRevision || wasScanning || msg.reason === 'complete') {
                state.scanRevision = rev;
                state.awaitingData = false;
                void load({ quiet: true });
              }
            }
          } catch {
            // ignore parse errors
          }
        };
        es.onerror = () => {
          // Browser auto-reconnects; keep poll as backup
          if (state.scanning || state.awaitingData) scheduleScanPoll();
        };
      } catch {
        // EventSource unavailable
      }
      setInterval(async () => {
        try {
          const h = await fetch('/api/health').then((r) => r.json());
          let need = false;
          if (h.pricingRevision && h.pricingRevision !== pricingRevision) {
            pricingRevision = h.pricingRevision;
            need = true;
          }
          if (typeof h.scanRevision === 'number' && h.scanRevision !== state.scanRevision) {
            state.scanRevision = h.scanRevision;
            need = true;
          }
          if (Boolean(h.scanning) !== state.scanning) {
            state.scanning = Boolean(h.scanning);
            need = true;
          }
          if ((h.eventCount || 0) !== state.lastEventCount) {
            need = true;
          }
          if (need) void load({ quiet: true });
          else if (h.scanning || ((h.eventCount || 0) === 0 && state.awaitingData)) {
            scheduleScanPoll();
          }
        } catch {
          // offline
        }
      }, 3000);
    }
    watchLiveStream();
  </script>
</body>
</html>
